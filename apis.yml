aid: smartproxy
name: Smartproxy
description: >-
  Smartproxy (now also known as Decodo) is a proxy network and web scraping
  infrastructure platform providing residential, datacenter, mobile, and ISP
  proxies for web data collection at scale. The Smartproxy API enables
  programmatic management of proxy accounts, sub-users, traffic allocation,
  IP whitelisting, and endpoint discovery. The platform supports both rotating
  and sticky session proxy connections across global geographic locations.
