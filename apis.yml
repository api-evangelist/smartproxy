apis:
  - aid: smartproxy:proxy-management-api
    name: Smartproxy Account Management API
    description: >-
      The Smartproxy API provides programmatic access to manage proxy
      sub-users, monitor traffic consumption, configure IP whitelisting,
      check subscription status, and discover available proxy endpoints.
      Base URL: https://api.decodo.com/v1. Authentication via API key token
      in the Authorization header obtained from the /auth endpoint.
