naftiko: "1.0.0-alpha1"

info:
  label: Smartproxy API
  description: >-
    Smartproxy API for managing proxy accounts, sub-users, traffic allocation,
    IP whitelisting, and endpoint discovery across residential, datacenter,
    and mobile proxy services.
  tags:
    - Smartproxy
    - Proxies
    - Web Scraping
    - Data Collection
    - Network
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMARTPROXY_API_KEY: SMARTPROXY_API_KEY
      SMARTPROXY_USER_ID: SMARTPROXY_USER_ID

capability:
  consumes:
    - type: http
      namespace: smartproxy
      baseUri: https://api.decodo.com/v1
      description: Smartproxy/Decodo account management API
      authentication:
        type: apikey
        key: Authorization
        value: "{{SMARTPROXY_API_KEY}}"
        placement: header
      resources:
        - name: sub-users
          path: /users/{userId}/sub-users
          description: Manage proxy sub-user accounts
          operations:
            - name: get-sub-users
              method: GET
              description: List all proxy sub-users
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: Primary account user ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-sub-user
              method: POST
              description: Create a new proxy sub-user account
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"
                  service_type: "{{tools.service_type}}"
                  traffic_limit: "{{tools.traffic_limit}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-sub-user
              method: PUT
              description: Update a sub-user's traffic limit or password
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  password: "{{tools.password}}"
                  traffic_limit: "{{tools.traffic_limit}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sub-user
          path: /users/{userId}/sub-users/{subUserId}
          description: Manage specific sub-user
          operations:
            - name: delete-sub-user
              method: DELETE
              description: Permanently delete a proxy sub-user
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                - name: subUserId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sub-user-traffic
          path: /users/{userId}/sub-users/{username}/traffic
          description: Monitor sub-user traffic usage
          operations:
            - name: get-sub-user-traffic
              method: GET
              description: Get traffic usage for a specific sub-user
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: allocated-traffic
          path: /users/{userId}/allocated-traffic
          description: Monitor overall traffic allocation
          operations:
            - name: get-allocated-traffic
              method: GET
              description: Get total allocated traffic across all sub-users
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: whitelisted-ips
          path: /users/{userId}/whitelisted-ips
          description: Manage IP whitelist for proxy authentication
          operations:
            - name: get-whitelisted-ips
              method: GET
              description: List all whitelisted IP addresses
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: add-whitelisted-ips
              method: POST
              description: Add IP addresses to the authentication whitelist
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  IPAddressList: "{{tools.ip_addresses}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: whitelisted-ip
          path: /users/{userId}/whitelisted-ips/{id}
          description: Manage specific whitelisted IP
          operations:
            - name: delete-whitelisted-ip
              method: DELETE
              description: Remove an IP from the whitelist
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subscriptions
          path: /users/{userId}/subscriptions
          description: View subscription details
          operations:
            - name: get-subscriptions
              method: GET
              description: Get active subscription plans and limits
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: endpoints
          path: /endpoints
          description: Discover proxy endpoints
          operations:
            - name: get-endpoints
              method: GET
              description: List all available proxy endpoints
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: endpoints-by-type
          path: /endpoints/{type}
          description: Get endpoints filtered by type
          operations:
            - name: get-endpoints-by-type
              method: GET
              description: Get proxy endpoints by connection type
              inputParameters:
                - name: type
                  in: path
                  type: string
                  required: true
                  description: Endpoint type (random, sticky, datacenter, mobile)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: smartproxy-rest
      resources:
        - path: /v1/sub-users
          name: sub-users
          operations:
            - method: GET
              name: get-sub-users
              description: List all proxy sub-users
              call: "smartproxy.get-sub-users"
              with:
                userId: "rest.userId"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: smartproxy-mcp
      transport: http
      tools:
        - name: get-sub-users
          description: List all proxy sub-user accounts
          hints:
            readOnly: true
            openWorld: false
          call: "smartproxy.get-sub-users"
          with:
            userId: "tools.userId"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-sub-user-traffic
          description: Get traffic usage for a specific proxy sub-user
          hints:
            readOnly: true
            openWorld: false
          call: "smartproxy.get-sub-user-traffic"
          with:
            userId: "tools.userId"
            username: "tools.username"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-subscriptions
          description: Get active subscription plans and limits
          hints:
            readOnly: true
            openWorld: false
          call: "smartproxy.get-subscriptions"
          with:
            userId: "tools.userId"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-endpoints
          description: List all available proxy endpoints with connection details
          hints:
            readOnly: true
            openWorld: true
          call: "smartproxy.get-endpoints"
          outputParameters:
            - type: array
              mapping: "$."
